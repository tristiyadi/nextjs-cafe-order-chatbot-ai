version: "3.8"

services:
  # Database: PostgreSQL with persistence
  db:
    image: postgres:17-alpine
    container_name: cafe-db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-cafe_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Vector Database for Semantic Search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cafe-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Embedding Service: Hugging Face Text Embedding Inference (TEI)
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    container_name: cafe-tei
    restart: always
    ports:
      - "8001:80"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: --model-id ${EMBEDDING_MODEL_ID:-intfloat/multilingual-e5-small} --port 80
    volumes:
      - tei_cache:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Local LLM Service (with pre-built models)
  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: cafe-llm
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main Next.js Web App
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: cafe-app
  #   restart: always
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DATABASE_URL=postgres://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-password}@db:5432/${DATABASE_NAME:-cafe_db}
  #     - QDRANT_URL=http://qdrant:6333
  #     - EMBEDDING_SERVICE_URL=http://embedding:8001
  #     - LOCAL_LLM_URL=http://llm:11434/v1
  #     - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-llama3.2:1b}
  #     - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-your-better-auth-secret}
  #     - BETTER_AUTH_URL=http://localhost:3000
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     qdrant:
  #       condition: service_healthy
  #     embedding:
  #       condition: service_healthy
  #     llm:
  #       condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  tei_cache:
